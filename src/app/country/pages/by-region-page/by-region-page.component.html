<!-- country-search-input -->

<h1 class="text=2xl">Por Region</h1>
<h3 class="text-lg">Seleccione una Region</h3>


<section class="row mt-2">
  <div class="flex-col">

    @for (region of regions; track $index) {
    <button class="btn btn-outline mr-2" (click)="query.set(region)" [class.btn-primary]="query() === region">
      {{region}}</button>
    }
  </div>

</section>

<!-- country-list  -->
<app-country-list [countries]="countryResource.hasValue() ? countryResource.value() : []"
  [errorMessage]="countryResource.error()"
  [isEmpty]="countryResource.hasValue() && countryResource.value().length === 0"
  [isLoading]="countryResource.isLoading()" />
