<!-- country-search-input -->
<app-country-search-input placeholder="Buscar por Pais" (value)="query.set($event)" [initialValue]="query()" />
<!-- country-list  -->
<app-country-list [countries]="countryResource.hasValue() ? countryResource.value() : []"
  [errorMessage]="countryResource.error()"
  [isEmpty]="countryResource.hasValue() && countryResource.value().length === 0"
  [isLoading]="countryResource.isLoading()" />
